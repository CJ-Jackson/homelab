apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: forgejo
  name: forgejo
spec:
  replicas: 1 
  selector:
    matchLabels:
      app: forgejo
  strategy:
    rollingUpdate: null
    type: Recreate
  template:
    metadata:
      labels:
        app: forgejo
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000

      containers:
        - image: codeberg.org/forgejo/forgejo:16.0.0
          name: forgejo
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
            - containerPort: 2222
              name: ssh
              protocol: TCP

          command:
            - forgejo
          args:
            - web
            - --config
            - /etc/forgejo/app.ini
            - --custom-path
            - /var/lib/forgejo/custom

          securityContext:
            allowPrivilegeEscalation: false

          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /api/healthz
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5

          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /api/healthz
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5

          volumeMounts:
            - mountPath: /var/lib/forgejo
              name: forgejo-data
            - mountPath: /etc/forgejo
              name: forgejo-config
            - mountPath: /script
              name: script

      volumes:
      - name: forgejo-data
        persistentVolumeClaim:
          claimName: forgejo-data-pvc
      - name: forgejo-config
        secret:
          secretName: forgejo-config
          items:
          - key: "app.ini"
            path: "app.ini"
      - name: script
        configMap:
          name: script-map
          items:
          - key: backup
            path: backup
            mode: 0755
